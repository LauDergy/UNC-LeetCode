version: "3.9"
services:
  server:
    image: node:20
    working_dir: /app/server
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=4000
      - JAVA_RUNNER_IMAGE=unc-java-runner:latest
    ports:
      - "4000:4000"
    depends_on:
      - java-runner-image

  client:
    image: node:20
    working_dir: /app/client
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - server

  java-runner-image:
    build:
      context: ./docker/java-runner
    image: unc-java-runner:latest
    command: ["sh", "-c", "echo Java runner image built"]
